<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIC | Simulador de Engenharia Social 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff003c;
            --bg: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e6;
            --text-dim: #a0a0b0;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Space+Grotesk', sans-serif; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        .logo {
            font-size: 0.9rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .app-title {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #0088ff);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Quiz Card */
        #quiz-app {
            position: relative;
            min-height: 500px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }

        .question-meta {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.4;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 14px;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.08);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option-btn.correct {
            background: rgba(0, 255, 136, 0.15) !important;
            border-color: var(--success) !important;
            color: var(--success);
        }

        .option-btn.wrong {
            background: rgba(255, 0, 60, 0.15) !important;
            border-color: var(--secondary) !important;
            color: var(--secondary);
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.7;
        }

        /* Explanation Box */
        .explanation {
            margin-top: 30px;
            padding: 24px;
            border-left: 4px solid var(--primary);
            background: rgba(0, 243, 255, 0.03);
            border-radius: 0 16px 16px 0;
            animation: slideIn 0.5s ease;
        }

        .explanation-title {
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: block;
        }

        .explanation-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-dim);
        }

        .next-btn {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Space Grotesk';
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2);
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }

        @media (max-width: 600px) {
            .app-title { font-size: 1.8rem; }
            .card { padding: 25px; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Forensic Ingestion Terminal</div>
            <h1 class="app-title">SIC - Engenharia Social</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Simulado Técnico Baseado em Doutrina Operacional 2024</p>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </header>

        <main id="quiz-app">
            <!-- Questions will be injected here -->
        </main>
    </div>

    <script>
        const quizData = [
            {
                pergunta: "Durante a fase de auditoria de uma política de segurança, um analista observa que, apesar de fortes controles perimetrais, a organização é vulnerável devido ao 'elo mais fraco'. Segundo a doutrina fornecida, por que a Engenharia Social é considerada mais eficiente do que ataques técnicos a sistemas?",
                lista_de_opcoes: [
                    "Devido à ausência total de softwares de criptografia para defesa de dados pessoais.",
                    "Porque a manipulação psicológica é mais fácil de executar do que a invasão de sistemas computacionais.",
                    "Pela impossibilidade técnica de rastrear chamadas de Vishing com spoofing.",
                    "Porque sistemas de hardware são imunes a ataques que exploram o fator humano."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "Conforme o PDF (p. 3), a Engenharia Social explora o fator humano pois 'é mais fácil fazer uma manipulação psicológica nas pessoas do que invadir um sistema de computador'."
            },
            {
                pergunta: "Um atacante realiza uma pesquisa abrangente sobre uma organização através de fontes abertas e redes sociais antes de selecionar um alvo específico. Em qual fase do ataque de engenharia social o atacante se encontra?",
                lista_de_opcoes: [
                    "Estabelecimento de relação de confiança.",
                    "Exploração da relação.",
                    "Busca e coleta de informações.",
                    "Sabotagem e assistência técnica."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "A primeira fase do ataque (p. 8) é a 'Busca e coleta de informações', onde o atacante realiza uma pesquisa abrangente sobre a organização-alvo através de várias fontes."
            },
            {
                pergunta: "Considere o cenário onde um funcionário recebe um e-mail falso solicitando verificação imediata de ID devido a 'atividade incomum'. Este ataque explora primariamente quais fraquezas humanas?",
                lista_de_opcoes: [
                    "O desejo de ser útil e a curiosidade técnica.",
                    "A tendência de evitar conflitos e o medo de ficar em apuros.",
                    "A tendência de confiar nas pessoas e a conformidade social.",
                    "A atenção seletiva e o enquadramento (framing) de mensagens."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "A doutrina (p. 4) lista o 'medo de ficar em apuros' e a 'tendência de evitar conflitos' como duas das quatro fraquezas fundamentais exploradas."
            },
            {
                pergunta: "Qual a distinção fundamental entre 'Método' e 'Técnica' no contexto de um ataque de engenharia social?",
                lista_de_opcoes: [
                    "O método é a ação imediata, enquanto a técnica é o plano de longo prazo.",
                    "A técnica é um plano que contém procedimentos, enquanto o método é a execução prática.",
                    "O método é um plano/procedimento para conduzir o pensamento; a técnica é como se deve agir para atingir o objetivo imediatamente.",
                    "Não há distinção técnica; ambos os termos são sinônimos."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "Página 11: O método é um plano/procedimento; a técnica apresenta como se deve agir para atingir um objetivo imediatamente."
            },
            {
                pergunta: "Um engenheiro social orquestra uma situação onde o alvo 'assume' que o atacante já foi validado anteriormente por outro colega. Qual técnica está sendo aplicada?",
                lista_de_opcoes: [
                    "Engenharia Social Reversa.",
                    "Cadeia de Autenticação.",
                    "Priming (Preparação).",
                    "Atenção Seletiva."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "Cadeia de Autenticação (p. 18): Criar uma situação em que o alvo assume que o engenheiro social já foi validado através da credibilidade de um funcionário legítimo."
            },
            {
                pergunta: "Na 'Engenharia Social Reversa', quais são as três fases obrigatórias citadas no documento?",
                lista_de_opcoes: [
                    "Introdução, Sabotagem e Assistência.",
                    "Pesquisa, Abordagem e Exploração.",
                    "Simpatia, Culpa e Intimidação.",
                    "Framing, Priming e Conformidade."
                ],
                indice_resposta_correta: 0,
                explicacao_tecnica: "A página 17 detalha que a Engenharia Social Reversa pode envolver até três fases: Introdução, sabotagem e assistência."
            },
            {
                pergunta: "A manipulação do ambiente ou contexto para 'preparar' a mente da vítima para uma ação específica é definida como:",
                lista_de_opcoes: [
                    "Framing (Enquadramento).",
                    "Influência Social (Conformidade).",
                    "Priming (Preparação).",
                    "Shoulder Surfing."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "Priming (p. 21): Envolve a manipulação do ambiente ou contexto para 'preparar' a mente da vítima para uma ação específica."
            },
            {
                pergunta: "A técnica 'Vishing' (Voice + Phishing) é classificada doutrinariamente como um ataque baseado em:",
                lista_de_opcoes: [
                    "Computadores, por envolver o uso de protocolos VoIP.",
                    "Pessoas, por exigir interação presencial.",
                    "Celulares, por utilizar chamadas telefônicas para obter informações.",
                    "Hardware, por explorar falhas físicas."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "Classificação p. 7: Ataques com base em celulares envolvem ligações e conversas diretas com a vítima (Vishing)."
            },
            {
                pergunta: "O processo de usar uma informação 'inofensiva' para conseguir uma informação sensível, e esta para obter dados ainda mais críticos, chama-se:",
                lista_de_opcoes: [
                    "Do inofensivo ao sensível.",
                    "Ganhando credibilidade inicial.",
                    "Atenção seletiva.",
                    "Cadeia de autenticação."
                ],
                indice_resposta_correta: 0,
                explicacao_tecnica: "Página 20: Determinar qual informação pode ser obtida usando uma informação 'inofensiva' para conseguir uma informação sensível."
            },
            {
                pergunta: "Qual o objetivo tático do método 'Pressão e Solução'?",
                lista_de_opcoes: [
                    "Colocar o alvo em um estado emocional neutro.",
                    "Gerar uma emoção negativa e apresentar uma solução que a mitigue.",
                    "Utilizar a conformidade social.",
                    "Observar a linguagem corporal."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "Página 15: Aplicar pressão no alvo colocando-o num estado emocional negativo e apresentar uma solução que irá mitigar ou retirar a emoção."
            },
            {
                pergunta: "Observar a tela de um dispositivo alheio em locais públicos para capturar senhas é:",
                lista_de_opcoes: [
                    "Tailgating.",
                    "Framing.",
                    "Shoulder Surfing.",
                    "Atenção Seletiva."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "Shoulder Surfing (p. 25): Envolve observar a tela do computador ou celular de outra pessoa para obter informações confidenciais."
            },
            {
                pergunta: "O fenômeno de filtrar sons ou detalhes indesejáveis enquanto se foca no que o atacante deseja é:",
                lista_de_opcoes: [
                    "Priming ambiental.",
                    "Atenção seletiva.",
                    "Influência social.",
                    "Linguagem corporal."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "Atenção Seletiva (p. 24): Fenômeno onde somos capazes de quase filtrar os sons indesejáveis, distraindo a atenção de detalhes importantes."
            },
            {
                pergunta: "O 'Tailgating' é difícil de detectar porque:",
                lista_de_opcoes: [
                    "Usa softwares de camuflagem.",
                    "O atacante parece estar autorizado ao seguir alguém de perto.",
                    "Baseia-se em e-mails falsos.",
                    "Explora a conformidade social."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "Página 26: O atacante parece estar autorizado a estar naquela área restrita ao seguir alguém de perto."
            },
            {
                pergunta: "Por que as instituições sofrem ataques de engenharia social segundo a p. 5 do PDF?",
                lista_de_opcoes: [
                    "Excesso de hardware de segurança.",
                    "Falta de treinamento, fácil acesso à informação e falta de políticas.",
                    "Políticas de segurança imutáveis.",
                    "Uso exclusivo de ataques digitais."
                ],
                indice_resposta_correta: 1,
                explicacao_tecnica: "As instituições sofrem devido à falta de treinamento, fácil acesso a informação e falta de políticas de segurança."
            },
            {
                pergunta: "Qual a vantagem estratégica dos 'Times de Engenharia Social'?",
                lista_de_opcoes: [
                    "Redução de custos operacionais.",
                    "Eliminar a fase de busca e coleta.",
                    "Abordagem colaborativa para planos bem mais sofisticados.",
                    "Garantir que a linguagem corporal não seja lida."
                ],
                indice_resposta_correta: 2,
                explicacao_tecnica: "Página 29: Equipes usam abordagem colaborativa para desenvolver e implementar planos bem mais sofisticados."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const app = document.getElementById('quiz-app');
        const progressBar = document.getElementById('progress-bar');

        function initQuiz() {
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentQuestion];
            const progress = ((currentQuestion) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;

            app.innerHTML = `
                <div class="card">
                    <div class="question-meta">
                        <span>QUESTÃO ${currentQuestion + 1} DE ${quizData.length}</span>
                        <span>SCORE: ${score}</span>
                    </div>
                    <div class="question-text">${q.pergunta}</div>
                    <div class="options-grid" id="options">
                        ${q.lista_de_opcoes.map((opt, i) => `
                            <button class="option-btn" onclick="checkAnswer(${i})">
                                ${String.fromCharCode(65 + i)}) ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback" class="hidden">
                        <div class="explanation">
                            <span class="explanation-title">Exposição Doutrinária</span>
                            <p class="explanation-body">${q.explicacao_tecnica}</p>
                        </div>
                        <button class="next-btn" onclick="nextQuestion()">
                            ${currentQuestion === quizData.length - 1 ? 'FINALIZAR AVALIAÇÃO' : 'PRÓXIMA QUESTÃO'}
                        </button>
                    </div>
                </div>
            `;
        }

        window.checkAnswer = function(index) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const btns = document.querySelectorAll('.option-btn');
            
            if (index === q.indice_resposta_correta) {
                btns[index].classList.add('correct');
                score++;
            } else {
                btns[index].classList.add('wrong');
                btns[q.indice_resposta_correta].classList.add('correct');
            }

            btns.forEach(btn => btn.disabled = true);
            document.getElementById('feedback').classList.remove('hidden');
        };

        window.nextQuestion = function() {
            currentQuestion++;
            answered = false;
            if (currentQuestion < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            progressBar.style.width = '100%';
            const percent = Math.round((score / quizData.length) * 100);
            let message = "";
            
            if(percent >= 80) message = "EXCELENTE DESEMPENHO. Nível de prontidão operacional elevado.";
            else if(percent >= 60) message = "DESEMPENHO SATISFATÓRIO. Recomenda-se revisão dos protocolos técnicos.";
            else message = "DESEMPENHO INSUFICIENTE. Risco de segurança crítico detectado.";

            app.innerHTML = `
                <div class="card result-screen">
                    <h2 style="margin-bottom: 20px;">AVALIAÇÃO CONCLUÍDA</h2>
                    <div class="score-circle">${percent}%</div>
                    <p style="color: var(--text-dim); margin-bottom: 30px;">Você acertou ${score} de ${quizData.length} questões analíticas.</p>
                    <div class="explanation" style="border-color: ${percent >= 60 ? 'var(--success)' : 'var(--secondary)'}; background: rgba(255,255,255,0.02)">
                        <p class="explanation-body" style="color: #fff; font-weight: 600;">${message}</p>
                    </div>
                    <button class="next-btn" style="margin-top: 40px;" onclick="location.reload()">REINICIAR SIMULADOR</button>
                </div>
            `;
        }

        initQuiz();
    </script>
</body>
</html>
