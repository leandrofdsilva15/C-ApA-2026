            { id: 1012, disciplina: "normas", topico: "UN-02 - Papel Normativo do COTIM", enunciado: "O Conselho de Tecnologia da Informação da Marinha (COTIM) desempenha o ápice da governança digital na força. Sua finalidade mandatória é atuar como colegiado responsável por:", alternativas: ["Realizar suporte remoto na configuração local de VLAN no chão de fábrica das OM's subordinadas isoladas sob auditoria inopinada bimestral rotatória.", "Prestar suporte tático a oficiais em operações ribeirinhas e formatação de desktops e periféricos sem uso de ferramentas de automação na tropa.", "Destinado a assessorar o Comandante da Marinha no trato dos assuntos relacionados à Governança da TI na MB. Em suas reuniões, o COTIM delibera sobre ações a serem tomadas concernentes aos diversos assuntos de TI na MB, notadamente aquelas que envolvam a participação dos ODS de uma forma coordenada.", "Garantir o cabeamento horizontal de todas as catracas operacionais perante licitações da Base Central nos almoxarifados da corporação militar ostensiva de Marinha.", "Elaborar o Relatório Policial de Apreensão Tática em ocorrências jurídicas de ciber invasão na OM local."], correta: 2, explicacao: "Trata-se do Conselho de Tecnologia da Informação da Marinha. Eles não formatam HD nem puxam cabo (CTIM executa isso). O COTIM delibera sobre ações a serem tomadas concernentes aos diversos assuntos de TI 
na MB, notadamente aquelas que envolvam a participação dos ODS de uma forma coordenada" },
            { id: 1013, disciplina: "normas", topico: "UN-02 - Escalões de Sustentação / Manutenção", enunciado: "Na dinâmica hierárquica logística de TI (Sistema de Manutenção), se um sistema operativo apresenta anomalias severas estruturais nos seus códigos vitais C++ que fogem à alçada básica da OM que o usa, quem será o responsável primário corretor deste nível (2º ou 3º escalão)?", alternativas: ["A corporação de limpeza civil local da base.", "Apenas OM encarregada isolada, forçando a mesma do zero a aplicar engenharia reversa para debugar a API desativando as demais missões correntes sem repassar.", "O órgão gestor estrito que detém a responsabilidade legal de desenhar, programar ou manter o código central e a sustentabilidade evolutiva de software/hardware em pauta na MB (Ex. Casop, CASNAV).", "A empresa parceira estrangeira sem autorizações locais em cloud cega e desintegrada na estrutura militar externa da nação cibernética civil alienígena na nuvem.", "As esquadras logísticas marítimas terceirizadas independentes."], correta: 2, explicacao: "O 1º escalão lida com cabos e reboots locais limpos (OM). O 2º e o 3º Escalão formam a espinha dorsal de reparo e update central de engenharia na arquitetura: trata-se do Órgão Especializado Desenvolvedor/Sustentador e do fabricante local daquela tecnologia na Marinha." },
            { id: 1014, disciplina: "normas", topico: "UN-02 - Contrato Fora da Marinha (4º Escalão)", enunciado: "Segundo as matrizes da doutrina, uma falha na placa-mãe de um servidor rack complexo cuja garantia comercial é acionada junto à Cisco Solutions/Dell, é classificada como atividade restrita ao:", alternativas: ["1º Escalão interno orgânico da unidade.", "2º Escalão executivo da OM especializada logísticamente e fisicamente.", "3º Escalão formatado na diretoria da CTM naval.", "4º Escalão de apoio e suporte logístico. (Sendo órgão civil e comercial Extra-MB operante prestando serviços licitados contratuais).", "5º Escalão supranacional civil internacional."], correta: 3, explicacao: "Sistemas em que militares terceirizam o conserto bruto e dependem integralmente na matriz para empresas e mantenedores extra-Marinha (fornecedor primário sob garantia SLA externa ou fabricantes civis industriais globais do hardware alienígena)." },
            { id: 1015, disciplina: "normas", topico: "UN-02 - Princípio de Doutrina da Economicidade", enunciado: "Toda aquisição na doutrina e Governança Naval é parametrizada pelo Princípio da Economicidade e Reuso Técnico. Isso dita fundamentalmente que:", alternativas: ["É proibido o reaproveitamento de código em novos mísseis cibernéticos ou centrais de apoio governamental limitadas da corporação.", "Softwares sob medida devem ser recriados do zero toda vez em cada OM independente local focada para combater a espionagem e assegurar diversidade despadronizada local inigualável no código tático ciber-soberano.", "Incentiva-se o compartilhamento tático generalizado transversal de sistemas (evitando que Oms criem a mesma roda ou softwares congêneres gerando redundância estéril, primando pela aquisição ou fabricação Macro Global e central que atenda à toda as forças estatais em uníssono orçamentário).", "Sistemas proprietários caros devem monopolizar todas as filiais logísticas e de controle burocráticos ostensivos nacionais da RECIM central independente dos open source sem barreiras lícitas aplicáveis nas casernas portuárias.", "OMs não devem adquirir hardware novo por 15 anos contínuos sob nenhuma métrica operativa ou gerencial para manter austeridade letal."], correta: 2, explicacao: "Economicidade, Racionalização e Padronização são a lei magna. Se uma OM já desenvolveu e codificou um sistema espetacular administrativo, este código deve ser escalonado localmente a todos os coirmãos (evitando redescobrir/codar/gastar recursos repetitivos localmente)." },
            { id: 1016, disciplina: "normas", topico: "UN-02 - Órgão Especializado", enunciado: "A estrutura de C2 da TI enquadra a DCTIM como 'Órgão de Direção Especializada (ODE)'. Isso infere a autoridade letal técnica para:", alternativas: ["Configurar diariamente a senha esquecida de cabos e e-mails locais do CIM militar na ponta operacional com SLA diurno restrito para cada militar logado orgânico na sede portuária distrital de defesa em profundidade da Marinha Nacional militar das costas terrestres base local das operações integradas nas frentes em tempos ostensivos.", "Aprovar planos de construção de encouraçados e estaleiros no Rio de Janeiro via orçamento bruto logístico em dólares estrito unicamente nas capitanias costeiras nacionais do interior civil unificado das capitais.", "Fixar e baixar ordens, instruções táticas normativas operativas globais (As famosas DCTIMARINST), auditar, estandardizar homologações seguras e certificar criptografias ou diretrizes base que incidirão imperativamente em todo Sistema de Comando na linha da base operacional logística Macro de Inteligência da MB civil ou restrita.", "Focar exclusividade na montagem mecânica fina das placas mãe em unidades militares portáteis das corporações na operação amazônica central logística no pantanal e interior florestal nas sedes regionais base passiva tática.", "Fazer a gestão local e manutenção direta via ticket de todos os roteadores wireless e mouses pânicos nas repartições civis hospitalares logradas dos almirantes e veteranos corporativos distritais sob uso corporativo rotineiro das praças navais e centros laborais abertos na Marinha local interna de logística base civil da praia marinha local."], correta: 2, explicacao: "Enquanto Diretoria Superior (Setorial), ela atua emanando normativos (as Leis Lógicas / Regimentos) que vinculam obrigatoriedade a toda esquadra Naval cibernética e certificando se o CTIM logístico pode aplicar X arquitetura." },
            {id: 1017, disciplina: "normas", topico: "UN-04 - ISIC", enunciado: "Qual a frequência máxima exigida para a revisão da Instrução de Segurança da Informação e Comunicações (ISIC)?", alternativas: ["Mínimo de seis meses.", "Máximo de um ano.", "Máximo de dois anos.", "Apenas quando o Titular solicitar.", "Não há periodicidade mínima."], correta: 2, explicacao: "A ISIC deve ser revisada periodicamente em um intervalo máximo de dois anos, conforme a DGMM-0540."},
{id: 1018, disciplina: "normas", topico: "UN-04 - ISIC", enunciado: "Qual o grau de sigilo obrigatório da Instrução de Segurança da Informação e Comunicações (ISIC)?", alternativas: ["RESERVADO.", "CONFIDENCIAL.", "SECRETO.", "OSTENSIVO.", "PÚBLICO E IRRESTRITO NO SITE DA MB."], correta: 3, explicacao: "A ISIC tem grau de sigilo OSTENSIVO para que alcance todos os dependentes e usuários da rede local."},
{id: 1019, disciplina: "normas", topico: "UN-04 - ISIC", enunciado: "Quem é o responsável direto pela elaboração e revisão da ISIC na Organização Militar?", alternativas: ["O Administrador de Rede (ADMIN).", "O Encarregado da Segurança da Informação e Comunicações (OSIC).", "O Centro de Tecnologia da Informação da Marinha (CTIM).", "O Comando de Operações Navais (ComOpNav).", "O Titular da OM."], correta: 1, explicacao: "A elaboração e revisão da ISIC são de responsabilidade do OSIC da OM."},
{id: 1020, disciplina: "normas", topico: "UN-04 - PLCONT", enunciado: "Sobre o Plano de Contingência (PLCONT), qual o grau de sigilo mínimo exigido?", alternativas: ["OSTENSIVO.", "RESERVADO.", "CONFIDENCIAL.", "SECRETO.", "ULTRASSECRETO."], correta: 1, explicacao: "O PLCONT é um documento sensível que visa manter a continuidade operacional e deve ter grau de sigilo mínimo RESERVADO."},
{id: 1021, disciplina: "normas", topico: "UN-04 - PLCONT", enunciado: "Quem é o principal responsável por ativar o Plano de Contingência (PLCONT) quando um fato anormal afeta a rede?", alternativas: ["O Comandante da Marinha.", "O Gestor de Ciberdefesa.", "O Administrador da Rede (ADMIN).", "O Sentinela.", "A Polícia do Exército."], correta: 2, explicacao: "A ativação do PLCONT é realizada pelo ADMIN sempre que um fato anormal ameaçar processos ou informações digitais."},
{id: 1022, disciplina: "normas", topico: "UN-04 - PLCONT", enunciado: "Qual a periodicidade máxima de revisão e de adestramento prático do PLCONT?", alternativas: ["Máximo de 2 anos.", "Máximo de 1 ano.", "A cada 6 meses.", "Sempre que ocorrer invasão.", "A cada 5 anos."], correta: 1, explicacao: "Tanto a revisão quanto o adestramento periódico para ativação do PLCONT possuem intervalo máximo de 1 ano."},
{id: 1023, disciplina: "normas", topico: "UN-04 - HRL", enunciado: "O Histórico da Rede Local (HRL) é o documento que compila a estrutura e incidentes. Quem é encarregado da elaboração, controle e manutenção do HRL?", alternativas: ["O Encarregado da Segurança da Informação e Comunicações (OSIC).", "O Administrador da Rede (ADMIN), sob supervisão do OSIC.", "A Diretoria de Comunicações.", "O Titular da OM.", "O Tribunal Marítimo."], correta: 1, explicacao: "O HRL é mantido pelo ADMIN, mas sob a estrita supervisão do OSIC."},
{id: 1024, disciplina: "normas", topico: "UN-04 - HRL", enunciado: "A qual grau de sigilo, no mínimo, o Histórico da Rede Local (HRL) deve ser resguardado?", alternativas: ["OSTENSIVO.", "CONFIDENCIAL.", "SECRETO.", "ULTRASSECRETO.", "RESERVADO."], correta: 4, explicacao: "O HRL possui mapas e histórico de vulnerabilidades, exigindo, no mínimo, classificação RESERVADO."},
{id: 1025, disciplina: "normas", topico: "UN-04 - Forense Computacional", enunciado: "Segundo a DCTIMARINST Nº 31-02B, qual a principal prioridade (1ª prioridade) para perícia forense pelo CTIM?", alternativas: ["Inquérito Policial Militar (IPM).", "Sindicância administrativa.", "Tratamento de Incidente de SI.", "Auditoria de SI programada.", "Solicitação Judicial."], correta: 4, explicacao: "A prioridade máxima (1ª) é a Solicitação Judicial, sobrepondo-se ao IPM (2ª)."},
{id: 1026, disciplina: "normas", topico: "UN-04 - Evidências Digitais", enunciado: "Em um caso de recolhimento probatório computacional, como a máquina deve ser tratada?", alternativas: ["O equipamento deve ser desligado normalmente (Start -> Shutdown) para preservar o sistema operacional.", "A máquina deve permanecer ligada e ser conectada a um pendrive de perícia.", "O equipamento NÃO deverá ser desligado da forma convencional; os cabos e energia devem ser desconectados sumariamente para preservar a RAM.", "Deve-se reiniciar o computador imediatamente para fechar os processos.", "A formatação deve ocorrer logo após a apreensão."], correta: 2, explicacao: "Em manobras de apreensão, o equipamento NÃO deve ser desligado pela via formal do S.O. para evitar o acionamento de scripts de autodestruição ou perda de dados em memória."},
{id: 1027, disciplina: "normas", topico: "UN-04 - Registros", enunciado: "Os logs fundamentais identificam o acesso dos usuários à Internet. Como se chama o registro de IP de origem, destino, data e hora?", alternativas: ["RAI (Registros de Acesso à Internet).", "REI (Registros de Envio/Recebimento).", "RMI (Registros de Mensagens Instantâneas).", "OSIC Logging.", "CTIM Tracker."], correta: 0, explicacao: "O RAI (Registros de Acesso à Internet) guarda as informações essenciais como IP, Destino e Horário."},
{id: 1028, disciplina: "normas", topico: "UN-04 - Controle de Mídias", enunciado: "Ao permitir a entrada de um visitante com notebook na Organização Militar, qual o procedimento basilar de segurança digital?", alternativas: ["Registrar o tipo de dispositivo, o responsável e aplicar um lacre visual.", "Instalar um antivírus da Marinha no dispositivo civil.", "Copiar todo o conteúdo do visitante.", "Negar a entrada em qualquer circunstância.", "Permitir o uso irrestrito da rede P2P interna."], correta: 0, explicacao: "A entrada de Dispositivos Armazenadores deve ser nominalmente registrada (tipo de dispositivo, data, visitante). Em caso de itens não autorizados, devem ser recolhidos na entrada."},
{id: 1029, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Na Marinha do Brasil, qual a finalidade principal de uma Auditoria de Segurança da Informação (SIC)?", alternativas: ["Punir e exonerar militares de TI em caso de incidentes graves.", "Desligar a rede durante 15 dias para varredura forense.", "Identificar e propor melhorias corporativas, garantindo conformidade operacional sem o condão primário de punição.", "Produzir evidências para o Tribunal de Contas da União imediatamente.", "Proibir o acesso externo indefinidamente."], correta: 2, explicacao: "As auditorias (DCTIMARINST-31-07) focam em atestar a maturidade e buscar melhorias nos processos (Conformidade), e não priorizam penalização punitiva na 1ª fase."},
{id: 1030, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Dentro da classificação de auditorias, o que caracteriza a Auditoria Inopinada?", alternativas: ["Aquela agendada anualmente e informada com meses de antecedência ao Comando.", "A auditoria exigida formalmente pelo próprio Titular (Auditoria Solicitada).", "A inspeção realizada sem nenhum aviso prévio, a fim de expor vulnerabilidades críticas reais no dia-a-dia da corporação.", "Auditoria executada apenas na DCTIM.", "Perícia contábil no departamento de TI."], correta: 2, explicacao: "A inopinada surge de surpresa sob alçada de autoridade competente militar para flagrar descuidos severos na rotina de SIC."},
{id: 1031, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Para auditorias Programadas, qual é o limite de tempo em que as Organizações Militares devem recebê-las?", alternativas: ["Pelo menos uma vez ao mês.", "Pelo menos uma vez a cada dois anos.", "Apenas a cada 5 anos.", "Decênio.", "Somente se o Comando solicitar."], correta: 1, explicacao: "As organizações (OM) devem ser auditadas sistematicamente, no mínimo, uma vez a cada dois anos."},
{id: 1032, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Qual documento coroa e encerra formalmente os achados e deficiências mapeadas pela Equipe de Auditoria (EA)?", alternativas: ["Plano de Contingência (PLCONT).", "Instrução de SIC (ISIC).", "Relatório de Auditoria e Constatações (RAD).", "Histórico de Rede (HRL).", "Ordem de Serviço."], correta: 2, explicacao: "O RAD (Relatório de Auditoria) consolida as fraquezas e deve ser entregue acompanhado de prazo para a OM sanar as vulnerabilidades."},
{id: 1033, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Após o encerramento da fase local da auditoria, qual o prazo legal que a Equipe tem para consolidar e enviar o Relatório (RAD) à OM auditada?", alternativas: ["7 dias úteis.", "15 dias.", "30 dias.", "45 dias.", "Até 60 dias após o início da fase local."], correta: 4, explicacao: "A norma estipula 60 dias a contar do início da fase local para entrega do Relatório RAD formalizado."},
{id: 1034, disciplina: "normas", topico: "UN-05 - Auditoria de SIC", enunciado: "Após o recebimento do Relatório de Auditoria (RAD), qual o prazo exato que a OM auditada tem para apresentar o plano de implementação (Ações Corretivas)?", alternativas: ["10 dias úteis.", "Até 45 dias.", "Dois anos.", "72 horas.", "Não há prazo."], correta: 1, explicacao: "A OM recebe o RAD e tem até 45 dias operacionais para devolver o TAC/Plano de adequação."},
{id: 1035, disciplina: "normas", topico: "UN-05 - RAV", enunciado: "O Relatório de Análise de Vulnerabilidades (RAV) tem por foco principal:", alternativas: ["Punição sumária de marinheiros que usaram pendrives.", "Identificar falhas intrínsecas nos ativos, sugerir as correções visando mitigar futuros incidentes base.", "Criar tabelas orçamentárias de aquisição cibernética.", "Processamento forense judicial exclusivo.", "Ataque militar proativo (Pentest) contra exércitos estrangeiros."], correta: 1, explicacao: "O RAV propõe melhorias e minimiza os incidentes buscando níveis ótimos de Segurança na RECIM e redes de bordo."},
{id: 1036, disciplina: "normas", topico: "UN-06 - Segurança Mobile", enunciado: "Sobre a segurança em Smartphones e Tablets funcionais na rede local (MDM):", alternativas: ["Permite-se o Rooting (Android) ou Jailbreak (iOS) para acessar configurações ocultas.", "O dispositivo corporativo não possui restrições, pois a rede é segura por padrão.", "É estritamente vedado o uso de dispositivos móveis funcionais alterados com Root ou Jailbreak, sob risco de demissão de perfil e bloqueio.", "Somente oficiais superiores podem ter os seus dispositivos logados em Root.", "A injeção remota via Bluetooth deve ser mantida sempre on."], correta: 2, explicacao: "Manter vulnerabilidades de Rooting ou Jailbreak em dispositivos da MB destrói o isolamento lógico e é proibido doutrinariamente."},
{id: 1037, disciplina: "normas", topico: "UN-06 - Segurança Mobile", enunciado: "Quais os métodos táticos preconizados para garantir a confidencialidade de um equipamento móvel funcional em caso de Furto ou Roubo (Perda)?", alternativas: ["Utilização obrigatória de Rastreio contínuo e habilidade mandamentícia de Wipe Remoto (Limpeza Completa via rede).", "Publicação de anúncio em jornais.", "Recolhimento do chip e envio de SMS inopinado.", "Solicitação ao Google/Apple por intermédio da Polícia Federal.", "Formatura e punição de toda a guarda do quartel."], correta: 0, explicacao: "Dispositivos Móveis funcionais devem, mandatoriamente aos administradores, dispor de Wipe Remoto e encriptação full disk ativa para proteção e obliteração de dados vazados."},
{id: 1038, disciplina: "normas", topico: "UN-06 - Segurança Mobile", enunciado: "No tocante a Bluetooth, Wi-Fi e Hotspots em dispositivos táticos em áreas sensíveis:", alternativas: ["Devem ser mantidos permanentemente ativados.", "Devem ser ativados apenas na praça d'armas.", "Devem permanecer DESLIGADOS sempre que não estiverem ativamente prestando serviço essencial, mitigando interceptação e clonagem.", "O protocolo WPA1 deve ser o padrão.", "Podem ser abertos a aparelhos corporativos e civis mistos na mesma interface."], correta: 2, explicacao: "O princípio da redução da superfície de ataque dita que rádios não utilizados momentaneamente (Bluetooth, NFC, Wi-Fi) devem ser desligados."},
{id: 1040, disciplina: "normas", topico: "UN-07 - Princípios GCiber", enunciado: "O Gerenciamento e a Guerra Cibernética (GCiber) aplicam princípios físicos à lógica. O que caracteriza o princípio da Massa?", alternativas: ["Ter milhares de computadores de mesa sem uso.", "A concentração oportuna de Superioridade Cibernética e força coordenada de processamento no Ponto Decisivo para mitigar e contra-atacar.", "Vender ativos obsoletos no sucateamento.", "Agrupar cabos metálicos.", "Desconectar todos os servidores ao mesmo tempo."], correta: 1, explicacao: "A Massa, como num combate marítimo, dita que se tenha capacidade esmagadora nas janelas de oportunidade no espaço cibernético."},
{id: 1041, disciplina: "normas", topico: "UN-07 - Princípios GCiber", enunciado: "Qual a relação tática da 'Economia de Forças' no ambiente SIC?", alternativas: ["Gastar menos orçamento.", "Distribuir poder de combate prudente em frentes secundárias para permitir concentração máxima de esforços na Missão Principal de Defesa de Redes Críticas e Ativos Navais vitais.", "Comprar softwares freeware inopinados.", "Evitar a compra de firewalls gerenciais.", "Utilizar um único funcionário para administrar todos os CPDs espalhados."], correta: 1, explicacao: "Alocar poder computacional focado e secundário, para que a frente chave de Ciberdefesa naval tenha absoluta robustez operacional."},
{id: 1042, disciplina: "normas", topico: "UN-07 - Princípios GCiber", enunciado: "A 'Segurança' em Operações GCiber tem seu cerne ancorado fundamentalmente em:", alternativas: ["Prevenir surpresas e degradação operatória, protegendo o esforço principal contra interferências hostis malwares, APTs e sabotagens externas (Ex.: Air gaps em redes de controle de navios).", "Trancar salas com dois cadeados padrão ISO.", "Apagar as luzes noturnas.", "Gritar 'segurança' como senha de passagem.", "Imprimir tudo em papel picado e degausser."], correta: 0, explicacao: "Medidas contínuas lógicas e ativas (Intrusions Prevention) garantem a manutenção intacta da operacionalidade das frotas da marinha."},
{id: 1043, disciplina: "normas", topico: "UN-07 - Ações de GCiber", enunciado: "São consideradas ações mandamentárias para Exploração Cibernética:", alternativas: ["Disparo cinético contra satélites (ASAT).", "O Mapeamento da topologia de redes inimigas e reconhecimento passivo do ambiente operacional computacional (OSINT e Scanning).", "Criação de portfólio web.", "Desativar o HRL do navio.", "Manobrar uma Fragata."], correta: 1, explicacao: "A extração de conhecimento situacional focado para suporte de decisões define a Fase de Inteligência cibernética naval (Ciberexploração)."},
{id: 1044, disciplina: "normas", topico: "UN-07 - Comando e Controle", enunciado: "Dentro das tarefas de Comando e Controle (C2), como a Defesa Cibernética de Perímetro atua nos datacenters OM Navais?", alternativas: ["Comprando trituradores para lixo comum do almoço.", "Emprego reativo e preemptivo contra ações intencionais de exaustão e Negação de Serviço (DDoS) voltadas contra portas lógicas do Centro de Guerra Acústica.", "Ignorando os alertas do SIEM e SOC.", "Mandando e-mails não criptografados ao CTIM.", "Permitindo telnet anônimo."], correta: 1, explicacao: "Rastreamento, contenção e mitigação massiva de pacotes contra a disponibilidade de datacenters militares."},
{id: 1046, disciplina: "normas", topico: "UN-08 - Espaço Cibernético", enunciado: "Relacionada à Ameaça Interna Insiders no âmbito da camada 'Corpo Social e Pessoal':", alternativas: ["Hackers chineses de malware furtivo atacando externamente.", "Servidores DNS comprometidos em países asiáticos em guerra cibernética declarada.", "O fator do usuário autorizado, subestimado, que por má-fé, insatisfação, chantagem ou engenharia social, deturpa, corrompe e sabota o código/base relacional sem a quebra do firewall perimetral das esquadras passivas.", "Bugs lógicos contidos no Kernel Linux.", "Danos cinéticos climáticos nos cabos marinhos navais litorâneos base corporativas."], correta: 2, explicacao: "Os Insiders militares ou civis, motivados ou aliciados, são riscos na camada Social (User awareness / Engenharia Pessoal)."},
{id: 1047, disciplina: "normas", topico: "UN-08 - Camada Física", enunciado: "Na salvaguarda do espaço cibernético corporativo em terra firme, a proteção perimetral física prescreve:", alternativas: ["Ausência de catracas visando facilitar o trabalho dinâmico open source naval corporativas litorânea marítima marinheiras pacificas passiva alienada navais do porto.", "Controle biométrico/Crachá restrito severo, blindagem contra pulso eletromagnético rústico e CFTV focado apenas em corredores, vedado focar monitores (proteção de ombro tática visual).", "Portas de vidro fumê e chave sob o tapete.", "Monitoramento CFTV contínuo da tela dos servidores lendo emails administrativos navais base naval militares frotas.", "Não utilizar proteção contra incêndios Nível 1 marcial naval."], correta: 1, explicacao: "A norma estrita de Proteção Física de recintos CPD bane CFTV olhando senhas (monitores) mas exige triagem absoluta nos acessos."},
{id: 1048, disciplina: "normas", topico: "UN-08 - Lixo Digital", enunciado: "De acordo com as boas práticas contidas na padronização Sic:", alternativas: ["Rascunhos, Post-Its contendo IP, nomes e manuais rabiscados na área de T.I. não apresentam risco bélico tático.", "A fragmentação prévia em micropartículas e a desmagnetização (Degausser) de matrizes e pendrives navais com vida útil obsoleta (Alienadas e descartadas) é imposta à toda equipe SIC da Organização.", "Os coletores municipais tratam da destruição rústica litorânea navais base frotas marinho operante frentes do porto.", "Deve-se doar HD's operacionais corporativas militares neta costeira marinhas para instituições civis sem nenhum WIPE prévio.", "Guardar senhas corporativas em gavetas e caixas comuns sob os racks frotas marcial navais."], correta: 1, explicacao: "Lixo logístico contendo Informação e Manuais (Dumpster Diving) é vetor letal nas auditorias de SI. Destruição segura e wipe é obrigatório."},
{id: 1049, disciplina: "normas", topico: "UN-08 - Tráfego Limpo", enunciado: "Os Protocolos classificados como Tráfego Limpo e Nativo ostentam altíssimo risco se usados largamente sem VPN corporativa tunelada devido à ausência de Encriptação:", alternativas: ["SSH e HTTPS.", "SMTP com TLS Tático e IPSEC.", "Telnet, FTP, TFTP e HTTP puro, que circulam pelo passadiço e cabos TCP/IP sem ofuscação (Plain text) facilitando sniffing passivo.", "WPA2 Enterprise e SNMPv3 Autenticado.", "SCP passiva litorânea naval corporativo."], correta: 2, explicacao: "Protocolos arcaicos e puramente textuais entregam senhas aos escutadores e nunca devem estar abertos em firewalls OM sem tunelamento severo."},
{id: 1050, disciplina: "normas", topico: "UN-02 - Doutrina Administrativa", enunciado: "Quem exerce as atividades e dita normativas do Órgão Central de Tecnologia da Informação (OCTI) na Marinha e fiscaliza centralizadamente:", alternativas: ["O ComOpNav, por exercer o Comando das Operações.", "A DCTIM (Diretoria de Comunicações e Tecnologia da Informação da Marinha).", "O Tribunal Marítimo, pela competência jurídica.", "Qualquer Base Naval de porte médio com infraestrutura própria.", "A Secretaria-Geral da Marinha, por subordinação hierárquica."], correta: 1, explicacao: "A DCTIM é o órgão mestre balizador (OCTI), promulgando doutrinas de defesa e tecnologia (ISIC/HRL/RAD base)."},
{id: 1051, disciplina: "normas", topico: "UN-05 - Auditorias", enunciado: "O papel do OSIC perante as Auditorias (RAD/RAV) no CPD da OM baseia-se em:", alternativas: ["Ocultar dados.", "Coordenar o acompanhamento transparente da EA e responder às averiguações documentais do HRL.", "Demitir marinheiros.", "Subornar a equipe de auditoria.", "Inibir varreduras lógicas de IP na malha da rede."], correta: 1, explicacao: "Transparência total e obediência, entregando HRL/PLCONT e colaborando."},
{id: 1052, disciplina: "normas", topico: "UN-04 - ISIC Disseminação", enunciado: "Características da ISIC:", alternativas: ["Apenas engenheiros devem lê-lo.", "O Grau é restrito e trancado a chaves.", "Simples, objetiva e de fácil compreensão e aplicação; Deve ser acessível a todos os usuários da rede local; e Grau de sigilo OSTENSIVO", "Não existe formalidade na entrega.", "Publicar em jornal civil."], correta: 2, explicacao: "Simples, objetiva e de fácil compreensão e aplicação; Deve ser acessível a todos os usuários da rede local; e Grau de sigilo OSTENSIVO"},
{id: 1053, disciplina: "normas", topico: "UN-03 - Proteção de Endpoints", enunciado: "Segundo as boas práticas e orientações das OM:", alternativas: ["Qualquer USB pode ser formatada na rede litorânea frotas navais passiva.", "Máquinas clientes devem transitar com pendrives privados para agilidade táctica marcial.", "Portas Físicas (USBs) da força principal das corporações desvinculadas das OM devem ser mantidas BLOQUEADAS logicamente para mitigar data exfiltration.", "Os tablets não possuem risco corporativas.", "Usa-se CD-R em todos os níveis navais."], correta: 2, explicacao: "Bloqueio estrito das mídias não auditadas e portáteis USB. O endpoint deve ser blindado a inserções lógicas clandestinas."},
{id: 1054, disciplina: "normas", topico: "UN-08 - Compartimentação de Servidores", enunciado: "Como é aplicada a política de segurança modular na infraestrutura de roteamento e servidores físicos da Base Militar?", alternativas: ["Servidores e switches empilhados sem controle de acesso.", "Compartimentação Física Severa: CPD isolado, portas corta-fogo, controle biométrico e racks trancados.", "Acesso livre sem distinção entre visitante e militar.", "Ambientes abertos para facilitar o trabalho colaborativo sem restrições.", "Catracas liberadas para agilizar o fluxo de trabalho."], correta: 1, explicacao: "Todo Core da rede (Enclave) sofre segregação restritiva presencial (trancas, racks chaveados e CPD blindado termicamente)."},
{id: 1055, disciplina: "normas", topico: "UN-05 - Controle de Acessos Lógicos", enunciado: "Quais políticas base (NIST/Normas) fundam a concessão de privilégios para praças e estagiários?", alternativas: ["Mínimo Privilégio estrito corporativo (Need-to-Know) aplicável, onde os direitos base de administrador litorânea marciais são negados a contas rotineiras.", "Eles herdam o root das frotas navais naval.", "Concedido provisório logístico corporativa navais do porto naval alienada.", "Pode-se usar uma senha master passiva base frotas marítima frentes marinhas marinheiros pacificas litorâneas.", "Qualquer militar pode criar novas pastas rústicas na raiz corporativa das esquadras passivas navais marciais rústica marinheiras civil do litoral marítimas corporativo frotas portuárias."], correta: 0, explicacao: "Doutrina do Just-in-Time/Least-Privilege: só possui o acesso minimamente exigido e bloqueio irrestrito por default."},
{id: 1056, disciplina: "normas", topico: "UN-04 - HRL Assinaturas", enunciado: "O registro do Evento em Histórico de Rede (HRL) deve ser:", alternativas: ["Impresso a lápis.", "Datado, rubricado pelo OSIC ou ADMIN logado, evidenciando quem notou as discrepâncias ou vulnerabilidades base.", "Anonimizado para não acusar navais frotas alienadas.", "Guardado em nuvem de big techs públicas.", "Apagado anualmente."], correta: 1, explicacao: "Rastreabilidade e imutabilidade dos relatórios diários de HRL firmados pelo ADMIN em turno de vigia cibernética."},
{id: 1057, disciplina: "normas", topico: "UN-08 - Negação de Serviço", enunciado: "O que configura o evento de Ataque DDoS?", alternativas: ["Atualizar o firmware de um switch de borda com patch aprovado pela DCTIM.", "Tráfego massivo e ilegítimo visando esgotar a capacidade do link WAN das telecomunicações navais, tornando o serviço indisponível (Negação de Serviço) via Botnets.", "Imprimir manuais de auditoria para distribuição.", "Uso de proxy HTTP para navegação civil autorizada.", "Teste de latência (ping) de rotina entre estações de trabalho."], correta: 2, explicacao: "Volume gigantesco de fluxo de dados ilegítimos para impossibilitar o uso dos servidores operacionais e comunicação externa em Organizações Militares."},
{id: 1058, disciplina: "normas", topico: "UN-06 - BYOD Interdição", enunciado: "Diferente de ambientes civis, nas OM Navais corporativas de alto sigilo militar:", alternativas: ["O uso de dispositivos pessoais é irrestrito, pois a rede militar suporta qualquer aparelho.", "É expressamente proibido o conceito BYOD em ambientes de alto sigilo, salvo concessão formal e isolamento via MDM.", "O usuário possui livre roteamento 4G integrado à RECIM.", "Qualquer dispositivo pode ser pareado via WPS sem restrições.", "Não existem proibições formais para dispositivos pessoais nas OM."], correta: 1, explicacao: "Rigor absoluto e banimento do conceito misto livre, a intersecção pessoal-militar expõe a base ao Shadow IT."},
{id: 1059, disciplina: "normas", topico: "UN-07 - Mitigação Lógica de Vetores", enunciado: "Assinale a ação primária do Sistema Corporativo contra Softwares Ilegítimos Extraviados Extrínsecos:", alternativas: ["Rodar pirataria local pacíficas corporativas rústica", "Controle de Integridade e Sandbox, o software não assinado, Shareware ou Pirataria (cracked), é banido sob penas disciplinares letais pela normatização base navais OSIC corporativas frentes marinheiros alienadas neta marciais navais logístico pacífica frotas do exército.", "Uso de torrent em horário não laborativo.", "Uso de serial compartilhado passiva neta naval marciais corporativo civil.", "Habilitar scripts navais no navegador neta."], correta: 1, explicacao: "Penalização imediata no uso do terminal OM para rodar Cracks, Malware potencial, Torrents ou Softwares sem Licitação Oficial da DCTIM."},
{id: 1060, disciplina: "normas", topico: "UN-04 - Assinatura do Termo (TCR)", enunciado: "Para ganhar direito de logar-se no ambiente da Malha, todo funcionário/militar:", alternativas: ["Acesso livre para quem é da casa frotas marinhas passivo.", "Deve obrigatoriamente assinar o correspondente Termo de Compromisso e Responsabilidade (TCR) que engloba as diretrizes da ISIC corporativa em vigor sob o Titular.", "Assinar a Ordem do Dia.", "Receber senha via rádio.", "Receber crachá biométrico temporário."], correta: 1, explicacao: "TCR formal vincula o CPF do usuário às punições em caso de negligência de credenciais, normatizado na ISIC."},
{id: 1061, disciplina: "normas", topico: "UN-04 - RAV e RAD", enunciado: "Qual a diferença técnica fundamental entre o RAV (Relatório de Análise de Vulnerabilidades) e o RAD (Relatório de Auditoria)?", alternativas: ["São documentos idênticos, apenas com nomes distintos.", "O RAV identifica exclusivamente falhas humanas; o RAD foca em hardware.", "O RAV mapeia tecnicamente as vulnerabilidades nos ativos de TI; o RAD consolida os achados gerais da auditoria e determina os planos de ação corretiva.", "O RAD é emitido antes da auditoria como planejamento prévio.", "O RAV é elaborado pelo Titular da OM; o RAD pela DCTIM."], correta: 2, explicacao: "RAV = diagnóstico técnico de brechas e exposições lógicas. RAD = documento cartorário de todo o processo auditorial, consttituindo o instrumento formal com prazos e cobranças à OM auditada."},
{id: 1062, disciplina: "normas", topico: "UN-04 - HRL Composição", enunciado: "A Parte III do Histórico da Rede Local (HRL) é especificamente destinada a:", alternativas: ["Descrever o estado atual do hardware de rede (switches, roteadores, cabeamento).", "Registrar atividades de rotina e eventos normais de segurança conforme a ISIC.", "Registrar os incidentes que afetam a SIC, incluindo reporte ao Titular e, quando necessário, à DCTIM e COMIMSUP.", "Documentar o orçamento de TI aprovado pelo Conselho COTIM.", "Listar os usuários credenciados e seus perfis de acesso."], correta: 2, explicacao: "DGMM-0540 Apêndice III: Parte I = Descrição da Rede; Parte II = Atividades de Rotina; Parte III = Incidentes de SIC, com obrigação de reporte ascendente quando graves."},
{id: 1063, disciplina: "normas", topico: "UN-05 - Composição da EA", enunciado: "A Equipe de Auditoria (EA) é formada e designada por qual instrumento formal, conforme a DCTIMARINST-31-07?", alternativas: ["Decreto do Comandante da Marinha publicado no DOU.", "Memorando interno do Titular da OM auditada.", "Portaria, sendo formada por membros qualificados designados oficialmente.", "Ordem Verbal do Oficial de Segurança (OSIC) de plantão.", "Convocação por e-mail da DCTIM sem formalização."], correta: 2, explicacao: "A DCTIMARINST-31-07 exige que a EA seja formalmente designada por Portaria, garantindo a legitimidade jurídica dos achados e da própria auditoria."},
{id: 1064, disciplina: "normas", topico: "UN-05 - Auditoria Fases", enunciado: "A Auditoria de SIC divide-se em duas fases distintas. Qual das alternativas descreve corretamente essa divisão?", alternativas: ["Fase de Ataque (Pentest) e Fase de Defesa (Patch).", "Fase Remota (prévia, com envio de questionários e varreduras à distância) e Fase Local (presencial, com inspeção in loco da OM).", "Fase Judicial e Fase Administrativa.", "Fase de Coleta e Fase de Destruição de Evidências.", "Fase de Planejamento e Fase de Publicação do RAD sem visita presencial."], correta: 1, explicacao: "A DCTIMARINST-31-07 estrutura a auditoria em Fase Remota (questionário, topologia de rede, varreduras online) e Fase Local (inspeção física presencial na OM)."},
{id: 1065, disciplina: "normas", topico: "UN-06 - MDM Conceito", enunciado: "O Mobile Device Management (MDM) é a solução técnica adotada para gerenciar dispositivos corporativos. Qual funcionalidade é essencial e mandatória no contexto da MB?", alternativas: ["Liberar o acesso irrestrito à Play Store para instalação de apps corporativos.", "Permitir que o usuário escolha seu próprio sistema operacional.", "Aplicar políticas de segurança remotamente, incluindo bloqueio, wipe e criptografia, sem depender da ação do usuário.", "Sincronizar automaticamente todos os dados com serviços de nuvem pública.", "Habilitar o compartilhamento de conexão (hotspot) para outros dispositivos da OM."], correta: 2, explicacao: "O MDM permite que o OSIC/ADMIN gerencie remotamente todos os dispositivos institucionais, aplicando políticas, revogando acessos e executando wipe em casos de perda, independentemente da ação do possuidor."},
{id: 1066, disciplina: "normas", topico: "UN-06 - Criptografia Mobile", enunciado: "Segundo as boas práticas para dispositivos móveis funcionais na MB, qual medida de proteção de dados em repouso é indispensável?", alternativas: ["Uso de PIN de 4 dígitos numéricos simples.", "Desativação da tela de bloqueio para agilizar o acesso em campo.", "Criptografia Full-Disk (FDE) ativa em todo o armazenamento do dispositivo.", "Armazenamento exclusivo em cartão microSD removível não criptografado.", "Backup automático no Google Drive pessoal do militar."], correta: 2, explicacao: "A criptografia de disco completo (FDE) garante que, mesmo com o dispositivo físico em posse de um adversário, os dados armazenados sejam ilegíveis sem as credenciais corretas."},
{id: 1067, disciplina: "normas", topico: "UN-07 - Princípio da Ofensiva", enunciado: "No contexto da Guerra Cibernética (GCiber), o princípio da 'Ofensiva' pressupõe fundamentalmente:", alternativas: ["Aguardar o ataque inimigo antes de qualquer ação defensiva.", "Tomar e manter a iniciativa, atuando proativamente para degradar, negar ou destruir a capacidade cibernética adversária.", "Defender exclusivamente os próprios nós de rede sem nenhuma contramedida ativa.", "Publicar as vulnerabilidades descobertas para forçar o adversário a se defender.", "Bloquear o acesso à internet como primeira medida de ataque."], correta: 1, explicacao: "O princípio da Ofensiva no domínio cibernético, como em qualquer outro domínio de combate, exige a iniciativa e a ação proativa para degradar a capacidade adversária, não apenas a defesa passiva."},
{id: 1068, disciplina: "normas", topico: "UN-07 - Princípio da Simplicidade", enunciado: "O princípio da 'Simplicidade' nas Operações de GCiber visa:", alternativas: ["Usar exclusivamente ferramentas de código aberto sem documentação.", "Formular planos de ciber-operação claros e ordens simples para evitar mal-entendidos e falhas de execução sob pressão.", "Reduzir o número de sistemas de TI da Marinha para facilitar a administração.", "Proibir o uso de criptografia por ser complexa demais para o nível de praça.", "Consolidar todas as operações em um único servidor centralizado."], correta: 1, explicacao: "Planos complexos são propensos a erros. A simplicidade nos planos cibernéticos garante execução eficiente, especialmente em ambientes de alta pressão e decibilidade temporal curta."},

        let index = 0;
        let score = { correct: 0, incorrect: 0 };
        let history = {};

        function init() {
            // Load history
            const savedHistory = localStorage.getItem('capa_sic_normas_history');
            if (savedHistory) {
                history = JSON.parse(savedHistory);
                score.correct = Object.values(history).filter(r => r.correct).length;
                score.incorrect = Object.values(history).filter(r => !r.correct).length;
            }

            // Shuffle
            QUESTOES_NORMAS_AVANCADAS.sort(() => Math.random() - 0.5);

            document.getElementById('total-q').innerText = QUESTOES_NORMAS_AVANCADAS.length;
            updateStats();
            renderQuestion();
        }

        function renderQuestion() {
            if (index >= QUESTOES_NORMAS_AVANCADAS.length) {
                document.getElementById('q-topic').innerText = "Finalizado";
                document.getElementById('q-text').innerText = "Você completou todas as questões desta etapa!";
                document.getElementById('q-options').innerHTML = "";
                document.getElementById('btn-next').disabled = true;
                return;
            }

            const q = QUESTOES_NORMAS_AVANCADAS[index];
            document.getElementById('current-q').innerText = index + 1;
            document.getElementById('q-topic').innerText = q.topico;
            document.getElementById('q-text').innerText = q.enunciado;

            const optionsContainer = document.getElementById('q-options');
            optionsContainer.innerHTML = '';

            // Hide feedback
            const feedbackBox = document.getElementById('q-feedback');
            feedbackBox.className = 'feedback';

            // State tracking
            const previousAnswer = history[q.id];

            q.alternativas.forEach((alt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';

                const letter = String.fromCharCode(65 + idx);
                optDiv.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${alt}</div>`;

                if (previousAnswer) {
                    optDiv.classList.add('disabled');
                    if (idx === q.correta) optDiv.classList.add('correct');
                    if (idx === previousAnswer.selected && !previousAnswer.correct) optDiv.classList.add('incorrect');
                } else {
                    optDiv.onclick = () => selectOption(idx);
                }

                optionsContainer.appendChild(optDiv);
            });

            if (previousAnswer) {
                showFeedback(previousAnswer.correct, q.explicacao);
                document.getElementById('btn-next').disabled = false;
            } else {
                document.getElementById('btn-next').disabled = true;
            }

            document.getElementById('btn-prev').disabled = index === 0;

            const progress = ((index) / QUESTOES_NORMAS_AVANCADAS.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function selectOption(selectedIdx) {
            const q = QUESTOES_NORMAS_AVANCADAS[index];
            if (history[q.id]) return; // Already answered

            const isCorrect = (selectedIdx === q.correta);
            history[q.id] = { selected: selectedIdx, correct: isCorrect };
            localStorage.setItem('capa_sic_normas_history', JSON.stringify(history));

            if (isCorrect) score.correct++;
            else score.incorrect++;

            updateStats();
            renderQuestion(); // Re-render to show disabled/correct state

            // Auto advance option? Not for now, force user to read explanation
        }

        function showFeedback(isCorrect, text) {
            const box = document.getElementById('q-feedback');
            const title = document.getElementById('feedback-title');
            document.getElementById('feedback-exp').innerText = text;

            box.className = 'feedback show ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
            title.innerText = isCorrect ? '✅ Resposta Correta!' : '❌ Resposta Incorreta';
        }

        function nextQuestion() {
            if (index < QUESTOES_NORMAS_AVANCADAS.length - 1) {
                index++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (index > 0) {
                index--;
                renderQuestion();
            }
        }

        function updateStats() {
            document.getElementById('score-correct').innerText = score.correct;
            document.getElementById('score-incorrect').innerText = score.incorrect;
        }

        function resetProgress() {
            if (confirm('Tem certeza? Isso apagará seu histórico de respostas neste quiz exclusivo de normas.')) {
                localStorage.removeItem('capa_sic_normas_history');
                location.reload();
            }
        }

        window.onload = init;
    </script>
