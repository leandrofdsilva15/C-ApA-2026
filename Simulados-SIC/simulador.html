            --wrong: #ff3366;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image:

            margin: 40px auto;
            padding: 20px;

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;

            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .stat-item {
            text-align: right;
        }

        .stat-label { color: var(--text-dim); display: block; }
        .stat-value { color: var(--accent); font-weight: 600; }

            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .entropy-progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 400px;
            position: relative;
        }

            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            padding: 4px 8px;
            background: rgba(0,0,0,0.3);

            display: inline-block;
            padding: 5px 15px;
            background: var(--accent-glow);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.4;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            transform: translateX(10px);
        }

        .option.selected {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        .option.correct {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--correct);
            color: var(--correct);
        }

        .option.wrong {
            background: rgba(255, 51, 102, 0.1);
            border-color: var(--wrong);
            color: var(--wrong);
        }

        .feedback {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            display: none;
        }

        .explanation {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .evidence {
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            font-style: italic;
        }

        .nav-buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {

            box-shadow: 0 0 20px var(--accent-glow);
        }

            text-align: center;
            padding: 60px;

            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;

        .difficulty-intermediate { background: #ffcc00; box-shadow: 0 0 5px #ffcc00; }
        .difficulty-easy { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

</head>

      "answer_explanation": "Justificativa Literal: 'BIOS ... Utiliza partição MBR (Master Boot Record) – discos de até 2TB ... UEFI ... Suporta tabela de partição GPT (GUID Partition Table) – discos de até 9,4 ZB e 128 partições' - Fonte: UN-02-Arquitetura-SO.pdf",
      "source_evidence": [
        {
          "file_name": "UN-02-Arquitetura-SO.pdf",
          "exact_snippet": "BIOS (Basic Input/Output\nSystem, ou Sistema Básico de Entrada/Saída) identifica e realiza testes\nsimples nos itens fundamentais de hardware, como processador,\nmemória e disco.\n\n3\n\n\f2 – ARQUITETURA DE SISTEMA\n\n2.1 Identificação e configuração de hardware.\nO sistema operacional, por meio do kernel, atua como\nintermediário entre o hardware e as aplicações. Ele é responsavél por:\n- Identificar os dispositivos de hardware;\n- Gerenciar recursos (CPU, memória e dispositivos de E/S);\n- Controlar a comunicação entre o software e hardware;\n- Garantir o funcionamento correto do sistema.\nSem o kernel, o software não consegue interagir com o hardware.\n\n4\n\n\f2 – ARQUITETURA DE SISTEMA\nPrincipais componentes de hardware\nCPU – Unidade central de processamento\n- Arquitetura: x86_64, ARM\n- comando: lscpu, top\nMemória\n- Armazena dados temporários (RAM – volátil)\n- Acesso rápido para execução de processos\n- Memória virtual: uso de swap em disco\n- comando: free -h, vmstat\n\n5\n\n\f2 – ARQUITETURA DE SISTEMA\n\nPrincipais componentes de hardware\nDisco\n- Armazenamento permanente de dados (HD, SSD, NVMe)\n- Organização: partições e sistemas de arquivos\n- Montagem em diretórios\n- comando: lsblk, fdisk -l, df -h\nRede\n- Comunicação entre sistemas\n- Interfaces: Ethernet, Wi-Fi\n- Endereçamento: IP e MAC\n- comando: ip a, ip route, ss -tuln\n\n6\n\n\f2 – ARQUITETURA DE SISTEMA\nPrincipais componentes de hardware\nPCIe\n- Barramento de alta velocidade\n- Conecta dispositivos ao sistema (placa de vídeo, placas de\nrede, controladoras, etc)\n- comando: lspci, lsusb\nFirmware\n- Software embarcado no hardware\n- BIOS/UEFI controla incialização (boot)\n- Realiza teste de hardware\n- comando: dmidecode, dmesg\n\n7\n\n\f2 – ARQUITETURA DE SISTEMA\nMódulos x Drivers\nNo sistema operacional Linux, os drivers são implementados como módulos\ndo kernel, responsáveis por permitir a comunicação entre o sistema e o\nhardware.\nNo Windows, os drivers geralmente são fornecidos pelos próprios\nfabricantes dos dispositivos. Já no Linux, muitos drivers são desenvolvidos pela\ncomunidade e integrados ao kernel.\nDevido a essa diferença, alguns dispositivos podem não possuir suporte\ncompleto no Linux, principalmente hardwares mais antigos ou específicos.\n\n💡\n\nSem driver (ou módulo), o sistema operacional não consegue utilizar o\nhardware.\n\n8\n\n\f2.2 – Inicialização (boot) do sistema\n\n9\n\n\f2.2 – Inicialização (boot) do sistema\n1 - BIOS/UEFI\nBIOS (Basic Input/Output System) – é o firmware legado presente em\nhardware fabricado antes de ~2010.\nCaracterísticas:\n- Utiliza partição MBR (Master Boot Record) – discos de até 2TB e 4\npartições primária\n- Realiza o POST (power-on self test), testa o hardware\n- Define a ordem do boot\n- Interface simples (geralmente sem gráficos)\n- Executado ao ligar o computador\nÉ o primeiro software a ser executado no sistema.\n\n10\n\n\f2.2 – Inicialização (boot) do sistema\n1 - BIOS/UEFI\nUEFI (Unified Extensible Firmware Interface) – é o firmware moderno\npresente na maioria dos equipamentos.\nCaracterísticas:\n- Suporta tabela de partição GPT"

        const quiz = {
            questions: embedded_data.questions,
            currentIndex: 0,
            score: 0,
            
            load() {
                document.getElementById('stat-progress').textContent = `0/${this.questions.length}`;
            },

            start() {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'block';
                this.render();
                
                anime({
                    targets: '#quiz-screen',
                    opacity: [0, 1],
                    translateY: [20, 0],
                    duration: 800,
                    easing: 'easeOutExpo'
                });
            },

            render() {
                const q = this.questions[this.currentIndex];
                document.getElementById('topic').innerHTML = `<span class="difficulty-indicator difficulty-${q.difficulty}"></span> ${q.topic}`;
                document.getElementById('question').textContent = q.question;
                document.getElementById('provenance').textContent = `ID: ${q.id} | TURN: 22 | SCORE: 0.98`;
                
                const optionsContainer = document.getElementById('options');
                optionsContainer.innerHTML = '';
                
                q.options.forEach(opt => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = opt;
                    div.onclick = () => this.check(opt[0], div);
                    optionsContainer.appendChild(div);
                });

                document.getElementById('feedback').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
            },

            check(letter, element) {
                const q = this.questions[this.currentIndex];
                const options = document.querySelectorAll('.option');
                options.forEach(opt => opt.style.pointerEvents = 'none');

                if (letter === q.correct_answer) {
                    element.classList.add('correct');
                    this.score++;
                    this.updateEntropy(true);
                } else {
                    element.classList.add('wrong');
                    options.forEach(opt => {
                        if (opt.textContent[0] === q.correct_answer) opt.classList.add('correct');
                    });
                    this.updateEntropy(false);
                }

                document.getElementById('explanation').textContent = q.answer_explanation;
                document.getElementById('evidence').textContent = `Fonte: ${q.source_evidence[0].file_name} -> "${q.source_evidence[0].exact_snippet}"`;
                document.getElementById('feedback').style.display = 'block';
                document.getElementById('next-btn').style.display = 'block';

                anime({
                    targets: '#feedback',
                    opacity: [0, 1],
                    scale: [0.95, 1],
                    duration: 400,
                    easing: 'easeOutQuad'
                });
            },

            updateEntropy(correct) {
                const total = this.questions.length;
                const progress = ((this.currentIndex + 1) / total) * 100;
                document.getElementById('stat-entropy').textContent = `${Math.round(progress)}%`;
                document.getElementById('entropy-bar').style.width = `${progress}%`;
                document.getElementById('stat-progress').textContent = `${this.currentIndex + 1}/${total}`;
            },

            next() {
                this.currentIndex++;
                if (this.currentIndex < this.questions.length) {
                    anime({
                        targets: '#quiz-screen',
                        opacity: [1, 0],
                        translateX: [0, -20],
                        duration: 300,
                        easing: 'easeInQuad',
                        complete: () => {
                            this.render();
                            anime({
                                targets: '#quiz-screen',
                                opacity: [0, 1],
                                translateX: [20, 0],
                                duration: 300,
                                easing: 'easeOutQuad'
                            });
                        }
                    });
                } else {
                    alert(`Protocolo Finalizado! Score: ${this.score}/${this.questions.length}`);
                }
            }
        };

        quiz.load();
